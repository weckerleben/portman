name: Release

# Tag a release and this builds the web UI, builds the wheel/sdist (the hatch
# build hook bundles frontend/dist into the package), and publishes to PyPI.
#
#   1. Bump `version` in backend/pyproject.toml
#   2. git tag v0.2.0 && git push --tags
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token in secrets. One
# time setup: on PyPI, add a "trusted publisher" for this repo + workflow file
# (`release.yml`) + environment (`pypi`). See
# https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Build web UI
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        working-directory: backend
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify the web UI was bundled
        working-directory: backend
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          wheel = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(wheel).namelist()
          if not any(n.startswith("portman/web/") for n in names):
              sys.exit("FAIL: portman/web/ not bundled into the wheel")
          print("OK: web UI bundled in", wheel)
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: backend/dist/
